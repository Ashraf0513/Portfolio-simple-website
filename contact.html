<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="container">

        </div>
        <h2 >Details</h2>
        <div class="class-two">
            <form>
                <table>
                    <tr>
                        <td>Name:</td>

                    </tr>
                    <tr>
                        <td>Email:</td>

                    </tr>

                        <td><textarea placeholder="Message" class="class-two__three"></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input class="class-two__one" type="submit"></td>
                    </tr>
                </table>
                <div class="class-three">
                    <table>
                        <tr>
                            <td>
                                <p>Social Media:</p>
                            </td>
                            <td> <a class="class-three__one" href="">Instagram</a>  <a class="class-three__two" href="">Linkedin</a></td>
                        </tr>
                        <p>&copy;Ashraf</p>
                    </table>
                </div>

                
            </form>

            
        </div>
    </div>
